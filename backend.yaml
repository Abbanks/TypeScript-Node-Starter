apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: express-app
        image: test-build:v3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: SESSION_SECRET # This must match what the code uses
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SESSION_SECRET
        - name: MONGODB_URI
          value: "mongodb://database-service:27017/myapp"
        - name: FACEBOOK_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: FACEBOOK_ID
        - name: FACEBOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: FACEBOOK_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: NodePort
